name: Action to build and publish the project as a nuget package to github package registry

on:
  push:
    branches: [master]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          global-json-file: global.json

      - name: build
        run: dotnet build --project src/Kuddle.Net/Kuddle.Net.csproj --configuration Release

      - name: Pack with dotnet
        run: |
          dotnet pack DotApple/DotApple.csproj --output artifacts --configuration Release -p:ContinuousIntegrationBuild=True

      - name: Push with dotnet
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json